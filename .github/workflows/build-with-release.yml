name: Build TWRP with Cache & Release

on:
  workflow_dispatch:
    inputs:
      boot_img_url:
        description: '📥 boot.img 直链下载地址（必填）'
        required: true
        type: string
      twrp_branch:
        description: '🔖 TWRP 版本分支'
        required: false
        default: 'twrp-9.0'
        type: choice
        options:
          - twrp-9.0
          - twrp-10.0
          - twrp-11
          - twrp-12.1
      output_type:
        description: '📦 编译产物类型（auto 自动检测）'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - recoveryimage
          - bootimage
      manufacturer:
        description: '🏭 设备厂商（留空自动检测）'
        required: false
        default: ''
        type: string
      device_codename:
        description: '📱 设备代号（留空自动检测）'
        required: false
        default: ''
        type: string
      sync_jobs:
        description: '⚡ 源码同步线程数（留空自动检测）'
        required: false
        default: ''
        type: string
      build_jobs:
        description: '🔨 编译线程数（留空自动检测全部核心）'
        required: false
        default: ''
        type: string
      create_release:
        description: '🚀 编译成功后自动创建 GitHub Release'
        required: false
        default: false
        type: boolean

jobs:
  build-twrp:
    name: 编译 TWRP
    runs-on: ubuntu-20.04
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 缓存 TWRP 源码
        id: cache-twrp
        uses: actions/cache@v4
        with:
          path: twrp
          key: twrp-source-${{ inputs.twrp_branch }}-${{ github.run_id }}
          restore-keys: |
            twrp-source-${{ inputs.twrp_branch }}-

      - name: 编译 TWRP 镜像
        id: twrp
        uses: ./
        with:
          boot-img-url: ${{ inputs.boot_img_url }}
          twrp-branch: ${{ inputs.twrp_branch }}
          output-type: ${{ inputs.output_type }}
          manufacturer: ${{ inputs.manufacturer }}
          device-codename: ${{ inputs.device_codename }}
          sync-jobs: ${{ inputs.sync_jobs }}
          build-jobs: ${{ inputs.build_jobs }}

      - name: 生成版本标签
        id: tag
        run: |
          DEVICE="${{ steps.twrp.outputs.device-codename }}"
          BRANCH="${{ inputs.twrp_branch }}"
          DATE=$(date +%Y%m%d)
          echo "tag_name=${DEVICE}-${BRANCH}-${DATE}" >> $GITHUB_OUTPUT
          echo "release_name=TWRP ${DEVICE} ${BRANCH} (${DATE})" >> $GITHUB_OUTPUT

      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: twrp-${{ steps.twrp.outputs.device-codename }}
          path: output/
          compression-level: 9

      - name: 创建 GitHub Release
        if: ${{ inputs.create_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          name: ${{ steps.tag.outputs.release_name }}
          files: output/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
