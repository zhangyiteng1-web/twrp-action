name: Build TWRP Recovery

on:
  workflow_dispatch:
    inputs:
      boot_img_url:
        description: '📥 boot.img 直链下载地址（必填）'
        required: true
        type: string
      twrp_branch:
        description: '🔖 TWRP 版本分支'
        required: false
        default: 'twrp-9.0'
        type: choice
        options:
          - twrp-9.0
          - twrp-10.0
          - twrp-11
          - twrp-12.1
      output_type:
        description: '📦 编译产物类型（auto 自动检测）'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - recoveryimage
          - bootimage
      manufacturer:
        description: '🏭 设备厂商（留空自动检测）'
        required: false
        default: ''
        type: string
      device_codename:
        description: '📱 设备代号（留空自动检测）'
        required: false
        default: ''
        type: string
      sync_jobs:
        description: '⚡ 源码同步线程数（留空自动检测 CPU 核心）'
        required: false
        default: ''
        type: string
      build_jobs:
        description: '🔨 编译线程数（留空自动检测全部核心）'
        required: false
        default: ''
        type: string

jobs:
  build-twrp:
    name: 编译 TWRP
    runs-on: ubuntu-20.04
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 编译 TWRP 镜像
        id: twrp
        uses: ./
        with:
          boot-img-url: ${{ inputs.boot_img_url }}
          twrp-branch: ${{ inputs.twrp_branch }}
          output-type: ${{ inputs.output_type }}
          manufacturer: ${{ inputs.manufacturer }}
          device-codename: ${{ inputs.device_codename }}
          sync-jobs: ${{ inputs.sync_jobs }}
          build-jobs: ${{ inputs.build_jobs }}

      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: twrp-${{ steps.twrp.outputs.device-codename }}-${{ inputs.twrp_branch }}
          path: output/
          compression-level: 9

      - name: 输出编译信息
        run: |
          echo "✅ TWRP 编译完成！"
          echo ""
          echo "设备厂商: ${{ steps.twrp.outputs.manufacturer }}"
          echo "设备代号: ${{ steps.twrp.outputs.device-codename }}"
          echo "TWRP 版本: ${{ inputs.twrp_branch }}"
          echo "编译类型: ${{ inputs.output_type }}"
          echo ""
          echo "📦 产物已上传至 Artifacts，请在运行页面下载"
