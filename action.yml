name: 'TWRP Auto Builder'
description: '只需提供 boot.img 直链，自动生成设备树并编译 TWRP 镜像'
author: 'twrp-action'
branding:
  icon: 'smartphone'
  color: 'blue'
inputs:
  boot-img-url:
    description: 'boot.img 或 recovery.img 的直链下载地址'
    required: true
  twrp-branch:
    description: 'TWRP 源码分支 (twrp-9.0, twrp-10.0, twrp-11, twrp-12.1 等)'
    required: false
    default: 'twrp-9.0'
  manufacturer:
    description: '设备厂商名称 (留空则自动从 boot.img 提取)'
    required: false
    default: ''
  device-codename:
    description: '设备代号 (留空则自动从 boot.img)'
    required: false
    default: ''
  output-type:
    description: 'auto/recoveryimage/bootimage'
    required: false
    default: 'auto'
  manifest-url:
    description: 'TWRP omni manifest'
    required: false
    default: 'https://github.com/minimal-manifest-twrp/platform_manifest_twrp_omni.git'
  sync-jobs:
    required: false
    default: ''
  build-jobs:
    required: false
    default: ''
outputs:
  recovery-image:
    value: ${{ steps.collect.outputs.recovery-image }}
  boot-image:
    value: ${{ steps.collect.outputs.boot-image }}
  device-codename:
    value: ${{ steps.dtgen.outputs.device-codename }}
  manufacturer:
    value: ${{ steps.dtgen.outputs.manufacturer }}
runs:
  using: 'composite'
  steps:
    - name: 安装依赖
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq software-properties-common
        sudo add-apt-repository -y ppa:deadsnakes/ppa
        sudo apt-get update -qq
        sudo apt-get install -qqy git-core gnupg flex bison build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig libncurses6 libncurses-dev python2.7 python3 python3-pip rsync libssl-dev
        sudo ln -sf /usr/bin/python2.7 /usr/bin/python2
        sudo ln -sf /usr/bin/python2 /usr/bin/python
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod +x ~/bin/repo
        echo "$HOME/bin" >> $GITHUB_PATH
        unset PIP_BREAK_SYSTEM_PACKAGES
        curl -sS https://bootstrap.pypa.io/get-pip.py | python3
        pip3 install twrpdtgen -q
        git config --global user.name TWRP
        git config --global user.email twrp@local
        git config --global color.ui false
    - name: 下载boot
      shell: bash
      run: |
        mkdir -p ${{ github.workspace }}/input
        wget -q -O ${{ github.workspace }}/input/boot.img "${{ inputs.boot-img-url }}"
    - name: 同步源码
      shell: bash
      run: |
        mkdir -p ${{ github.workspace }}/twrp
        cd ${{ github.workspace }}/twrp
        SYNC_JOBS=${{ inputs.sync-jobs }}
        SYNC_JOBS=${SYNC_JOBS:-$(nproc)}
        repo init --depth=1 -u ${{ inputs.manifest-url }} -b ${{ inputs.twrp-branch }}
        repo sync -j$SYNC_JOBS --force-sync
    - name: 生成设备树
      id: dtgen
      shell: bash
      run: |
        mkdir -p ${{ github.workspace }}/twrp/device
        cd ${{ github.workspace }}/twrp/device
        BOOT="${{ github.workspace }}/input/boot.img"
        MAN="${{ inputs.manufacturer }}"
        COD="${{ inputs.device-codename }}"
        if [[ -z "$MAN" || -z "$COD" ]]; then
          mkdir -p tmp_dt
          python3 -m twrpdtgen -o tmp_dt "$BOOT"
          REAL=$(find tmp_dt -name AndroidProducts.mk -exec dirname {} \; | head -1)
          COD=$(grep -oP 'PRODUCT_DEVICE=\K.+' "$REAL"/AndroidProducts.mk | head -1)
          MAN=$(grep -oP 'TARGET_BOARD_PLATFORM=\K.+' "$REAL"/BoardConfig.mk | head -1)
          MAN=${MAN:-unknown}
          COD=${COD:-generic}
          mkdir -p "$MAN"
          mv "$REAL" "$MAN/$COD"
          rm -rf tmp_dt
        else
          mkdir -p "$MAN"
          python3 -m twrpdtgen -o "$MAN/$COD" "$BOOT"
        fi
        # 抹平xiaomi嵌套目录
        DEEP="${MAN}/${COD}/xiaomi/${COD}"
        if [[ -d "$DEEP" ]]; then
          mv "$DEEP"/* "${MAN}/${COD}/"
          rm -rf "${MAN}/${COD}/xiaomi"
        fi
        TREE="device/$MAN/$COD"
        OMNI_MK="${TREE}/omni_${COD}.mk"
        # 修正mk内device.mk路径
        if [[ -f "$OMNI_MK" ]]; then
          sed -i "s|device/[^/]*/${COD}/device.mk|${TREE}/device.mk|" "$OMNI_MK"
          sed -i '/update_engine_sideload/d' "$OMNI_MK"
          echo "TARGET_NO_UPDATE_ENGINE_SIDELOAD := true" >> "$OMNI_MK"
        fi
        BC="${TREE}/BoardConfig.mk"
        if [[ -f "$BC" ]]; then
          sed -i '/BOARD_AVB_ENABLE/d' "$BC"
          # 彻底删除所有bootctrl、A/B相关行
          sed -i '/TARGET_BOOTCTRL/d' "$BC"
          sed -i '/BOARD_USES_RECOVERY_AS_BOOT/d' "$BC"
          sed -i '/BOARD_BUILD_SYSTEM_ROOT_IMAGE/d' "$BC"
          sed -i 's/--dtb/--dt/g' "$BC"
        fi
        echo "MANUFACTURER=$MAN" >> $GITHUB_ENV
        echo "DEVICE_CODENAME=$COD" >> $GITHUB_ENV
        echo "manufacturer=$MAN" >> $GITHUB_OUTPUT
        echo "device-codename=$COD" >> $GITHUB_OUTPUT
    - name: 编译TWRP
      shell: bash
      run: |
        cd ${{ github.workspace }}/twrp
        source build/envsetup.sh
        MAN="$MANUFACTURER"
        COD="$DEVICE_CODENAME"
        OT="${{ inputs.output-type }}"
        lunch omni_${COD}-eng
        export ALLOW_MISSING_DEPENDENCIES=true
        BC="device/$MAN/$COD/BoardConfig.mk"
        if [[ "$OT" == "auto" ]]; then
          if grep -q BOARD_RECOVERYIMAGE_PARTITION_SIZE "$BC"; then
            OT=recoveryimage
          else
            OT=bootimage
          fi
        fi
        echo "OUTPUT_TYPE=$OT" >> $GITHUB_ENV
        JOBS=${{ inputs.build-jobs }}
        JOBS=${JOBS:-$(nproc)}
        # 关键：全局禁用A/B、update引擎整套模块，不编译bootctrl相关代码
        mka -j$JOBS $OT TARGET_NO_AB_DEVICE=true TARGET_NO_UPDATE_ENGINE=true
    - name: 打包产物
      id: collect
      shell: bash
      run: |
        COD="$DEVICE_CODENAME"
        SRC=${{ github.workspace }}/twrp/out/target/product/$COD
        DST=${{ github.workspace }}/output
        mkdir -p $DST
        OT="$OUTPUT_TYPE"
        if [[ "$OT" == "recoveryimage" && -f $SRC/recovery.img ]]; then
          cp $SRC/recovery.img $DST/
          echo "recovery-image=$DST/recovery.img" >> $GITHUB_OUTPUT
        fi
        if [[ "$OT" == "bootimage" && -f $SRC/boot.img ]]; then
          cp $SRC/boot.img $DST/
          echo "boot-image=$DST/boot.img" >> $GITHUB_OUTPUT
        fi
        ls -lh $DST
