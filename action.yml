    - name: '生成设备树'
      id: dtgen
      shell: bash
      run: |
        # 确保 device 目录存在 (minimal manifest 默认没有)
        mkdir -p ${{ github.workspace }}/twrp/device
        cd ${{ github.workspace }}/twrp/device
        BOOT_IMG="${{ github.workspace }}/input/boot.img"
        MANUFACTURER="${{ inputs.manufacturer }}"
        DEVICE="${{ inputs.device-codename }}"
        # 如果未指定厂商和设备，先用 twrpdtgen 生成到临时目录
        if [ -z "$MANUFACTURER" ] || [ -z "$DEVICE" ]; then
          echo "使用 twrpdtgen 自动生成设备树..."
          mkdir -p tmp_device
          python3 -m twrpdtgen -o tmp_device "$BOOT_IMG"
          # 修复：递归查找包含 AndroidProducts.mk 的真实设备树目录
          REAL_DT_DIR=$(find tmp_device -type f -name "AndroidProducts.mk" -exec dirname {} \; | head -n1)
          echo "实际设备树目录：$REAL_DT_DIR"
          # 从真实目录读取 AndroidProducts.mk
          if [ -f "$REAL_DT_DIR/AndroidProducts.mk" ]; then
            DETECTED_DEVICE=$(grep -oP 'PRODUCT_NAME.*=\s*\Komni_\K.+' "$REAL_DT_DIR/AndroidProducts.mk" | head -1)
            if [ -z "$DETECTED_DEVICE" ]; then
              DETECTED_DEVICE=$(grep -oP 'PRODUCT_DEVICE.*=\s*\K.+' "$REAL_DT_DIR/AndroidProducts.mk" | head -1)
            fi
          fi
          # 从 BoardConfig.mk 尝试提取厂商信息
          if [ -f "$REAL_DT_DIR/BoardConfig.mk" ]; then
            DETECTED_MANUFACTURER=$(grep -oP 'TARGET_BOARD_PLATFORM.*=\s*\K.+' "$REAL_DT_DIR/BoardConfig.mk" | head -1)
          fi
          # 默认值兜底
          DETECTED_MANUFACTURER=${DETECTED_MANUFACTURER:-unknown}
          DETECTED_DEVICE=${DETECTED_DEVICE:-generic}
          MANUFACTURER=${MANUFACTURER:-$DETECTED_MANUFACTURER}
          DEVICE=${DEVICE:-$DETECTED_DEVICE}
          # 移动到正确的 device/manufacturer/device 目录
          mkdir -p "$MANUFACTURER"
          mv "$REAL_DT_DIR" "$MANUFACTURER/$DEVICE"
          rm -rf tmp_device
        else
          # 用户指定了厂商和设备，直接生成
          mkdir -p "$MANUFACTURER"
          python3 -m twrpdtgen -o "$MANUFACTURER/$DEVICE" "$BOOT_IMG"
        fi

        # ========== 新增核心修复代码，解决你当前报错 ==========
        # 抹平twrpdtgen自动生成的 xiaomi/代号 嵌套文件夹
        DEEP_TREE="${MANUFACTURER}/${DEVICE}/xiaomi/${DEVICE}"
        if [ -d "$DEEP_TREE" ]; then
            echo "检测到嵌套设备树目录，抹平层级：$DEEP_TREE"
            mv "$DEEP_TREE"/* "${MANUFACTURER}/${DEVICE}/"
            rm -rf "${MANUFACTURER}/${DEVICE}/xiaomi"
        fi
        # ======================================================

        echo "设备厂商: $MANUFACTURER"
        echo "设备代号: $DEVICE"
        echo "MANUFACTURER=$MANUFACTURER" >> $GITHUB_ENV
        echo "DEVICE_CODENAME=$DEVICE" >> $GITHUB_ENV
        echo "manufacturer=$MANUFACTURER" >> $GITHUB_OUTPUT
        echo "device-codename=$DEVICE" >> $GITHUB_OUTPUT
        # 修复 omni_xxx.mk 内错误的 include 路径，解决 device.mk not found
        TARGET_DT_PATH="$MANUFACTURER/$DEVICE"
        OMNI_MK="$TARGET_DT_PATH/omni_${DEVICE}.mk"
        if [ -f "$OMNI_MK" ]; then
          sed -i "s|device/[^/]*\/${DEVICE}/device.mk|device/${MANUFACTURER}/${DEVICE}/device.mk|g" "$OMNI_MK"
        fi
        # 修复常见编译问题
        BOARD_CONFIG="${TARGET_DT_PATH}/BoardConfig.mk"
        if [ -f "$BOARD_CONFIG" ]; then
          # 禁用 AVB 避免分区大小报错
          if ! grep -q "BOARD_AVB_ENABLE" "$BOARD_CONFIG"; then
            echo "BOARD_AVB_ENABLE := false" >> "$BOARD_CONFIG"
          fi
          # 修复 mkbootimg --dtb 参数兼容问题
          if grep -q "\-\-dtb" "$BOARD_CONFIG"; then
            sed -i 's/--dtb/--dt/g' "$BOARD_CONFIG"
          fi
        fi
